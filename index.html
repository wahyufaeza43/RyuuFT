<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civic Quest: Harmoni PPKN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #f0f4f8; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .timer-bar { transition: width 0.1s linear; }
        .btn-option:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="game-card" class="glass max-w-2xl w-full rounded-3xl shadow-2xl overflow-hidden border-4 border-white">
        
        <div class="bg-blue-600 p-6 text-white flex justify-between items-center">
            <div>
                <p class="text-xs opacity-80 font-bold uppercase tracking-widest">Skor</p>
                <h2 id="score" class="text-3xl font-black">0</h2>
            </div>
            <div class="text-right">
                <p class="text-xs opacity-80 font-bold uppercase tracking-widest">Nyawa</p>
                <h2 id="lives" class="text-3xl tracking-tighter">❤️❤️❤️</h2>
            </div>
        </div>

        <div class="w-full h-2 bg-gray-200">
            <div id="timer" class="timer-bar h-full bg-yellow-400 w-full"></div>
        </div>

        <div class="p-8">
            <div id="question-box">
                <span class="inline-block px-3 py-1 bg-blue-100 text-blue-600 rounded-full text-xs font-bold mb-4">SOAL <span id="q-number">1</span>/10</span>
                <h1 id="question-text" class="text-2xl font-bold text-gray-800 leading-tight mb-8">Memuat pertanyaan...</h1>
                
                <div id="options-container" class="space-y-4">
                    </div>
            </div>

            <div id="result-screen" class="hidden text-center py-10">
                <h2 id="result-title" class="text-4xl font-black mb-2">MISI SELESAI!</h2>
                <p id="result-msg" class="text-gray-600 mb-8">Kamu luar biasa dalam memahami keberagaman.</p>
                <div class="bg-blue-50 rounded-2xl p-6 mb-8">
                    <p class="text-sm text-gray-500 uppercase font-bold">Skor Akhir</p>
                    <h3 id="final-score" class="text-6xl font-black text-blue-600">0</h3>
                </div>
                <button onclick="location.reload()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-10 rounded-2xl shadow-lg transition-all">MAIN LAGI</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {q: "Upaya menciptakan kehidupan selaras dan seimbang disebut...", o: ["A. Konflik", "B. Harmoni", "C. Integrasi"], a: 1},
            {q: "Keberagaman ekonomi harus disikapi dengan cara...", o: ["A. Kompetisi", "B. Kerja sama", "C. Menghina"], a: 1},
            {q: "Gender dalam masyarakat merujuk pada...", o: ["A. Jenis Kelamin", "B. Peran Sosial", "C. Usia"], a: 1},
            {q: "Masalah akibat keberagaman yang tidak dikelola...", o: ["A. Persatuan", "B. Konflik", "C. Kemakmuran"], a: 1},
            {q: "Contoh harmoni keberagaman gender adalah...", o: ["A. Kesamaan hak sekolah", "B. Dominasi pria", "C. Diskriminasi"], a: 0},
            {q: "Sistem keturunan dari garis ibu disebut...", o: ["A. Patrilineal", "B. Matrilineal", "C. Bilateral"], a: 1},
            {q: "Strategi mengatasi konflik SARA adalah...", o: ["A. Diskriminasi", "B. Preventif", "C. Menghina"], a: 1},
            {q: "Suku Minangkabau menganut sistem...", o: ["A. Patrilineal", "B. Matrilineal", "C. Parental"], a: 1},
            {q: "Menganggap budayanya paling unggul disebut...", o: ["A. Etnosentrisme", "B. Toleransi", "C. Pluralisme"], a: 0},
            {q: "Dasar hukum kebebasan beragama adalah Pasal...", o: ["A. Pasal 27", "B. Pasal 29", "C. Pasal 30"], a: 1}
        ];

        let currentQ = 0;
        let score = 0;
        let lives = 3;
        let timeLeft = 100;
        let timerInterval;

        function startGame() {
            showQuestion();
            startTimer();
        }

        function startTimer() {
            timeLeft = 100;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft -= 0.5;
                document.getElementById('timer').style.width = timeLeft + "%";
                if (timeLeft <= 0) {
                    handleAnswer(-1); // Waktu habis dianggap salah
                }
            }, 50);
        }

        function showQuestion() {
            const q = questions[currentQ];
            document.getElementById('q-number').innerText = currentQ + 1;
            document.getElementById('question-text').innerText = q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.o.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "btn-option w-full text-left p-5 rounded-2xl border-2 border-gray-100 bg-white hover:border-blue-500 hover:bg-blue-50 transition-all font-semibold text-gray-700 flex justify-between items-center group";
                btn.innerHTML = `<span>${opt}</span> <span class="opacity-0 group-hover:opacity-100 text-blue-500">➜</span>`;
                btn.onclick = () => handleAnswer(index);
                container.appendChild(btn);
            });
        }

        function handleAnswer(index) {
            if (index === questions[currentQ].a) {
                score += 10;
                document.getElementById('score').innerText = score;
            } else {
                lives--;
                document.getElementById('lives').innerText = "❤️".repeat(lives) || "💀";
            }

            if (currentQ < questions.length - 1 && lives > 0) {
                currentQ++;
                showQuestion();
                startTimer();
            } else {
                endGame();
            }
        }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById('question-box').classList.add('hidden');
            document.getElementById('timer').parentElement.classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            if (lives <= 0) {
                document.getElementById('result-title').innerText = "GAME OVER";
                document.getElementById('result-title').className = "text-4xl font-black mb-2 text-red-500";
                document.getElementById('result-msg').innerText = "Jangan menyerah, ayo belajar lagi!";
            }
        }

        startGame();
    </script>
</body>
</html>
