<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmoni Duel - Shuffle Edition</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; text-align: center; margin: 0; padding: 10px; }
        #game-container { max-width: 600px; margin: auto; background: #16213e; padding: 20px; border-radius: 20px; border: 4px solid #4ecca3; }
        .setup-container { display: flex; justify-content: space-around; margin: 10px 0; }
        .p-box { padding: 10px; border-radius: 15px; width: 45%; }
        .p1-color { background: #00aaff; }
        .p2-color { background: #4ecca3; }
        .hero-img { width: 80px; height: 80px; object-fit: cover; border-radius: 50%; border: 3px solid white; }
        .turn-indicator { font-size: 1.1em; font-weight: bold; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        .question { font-size: 1.1em; margin: 15px 0; min-height: 50px; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; }
        .option { display: block; width: 100%; padding: 12px; margin: 8px 0; background: #0f3460; border: 2px solid #0f3460; color: white; border-radius: 10px; font-size: 1em; cursor: pointer; }
        .option:active { transform: scale(0.98); }
        .hidden { display: none; }
        .score-board { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; font-size: 0.9em; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen">
        <h2>⚔️ HARMONI DUEL ⚔️</h2>
        <div class="setup-container">
            <div class="p-box p1-color"><img src="https://i.ibb.co/C3Ym8Pzf/download.jpg" class="hero-img"><br>PLAYER 1</div>
            <div class="p-box p2-color"><img src="https://i.ibb.co/Rk3p0G6R/images.jpg" class="hero-img"><br>PLAYER 2</div>
        </div>
        <p>Lomba poin terbanyak! Jika nyawa habis, soal akan diacak.</p>
        <button class="option" onclick="startGame()">MULAI DUEL!</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="score-board">
            <span style="color: #00aaff;">P1: ❤️<span id="l1">5</span> | ⭐<span id="s1">0</span></span>
            <span style="color: #4ecca3;">P2: ❤️<span id="l2">5</span> | ⭐<span id="s2">0</span></span>
        </div>
        <div id="turn-box" class="turn-indicator p1-color">GILIRAN: PLAYER 1</div>
        <div class="question" id="question">Memuat soal...</div>
        <div id="options-container"></div>
    </div>

    <div id="end-screen" class="hidden">
        <h3 id="winner-text"></h3>
        <button class="option" onclick="resetAndShuffle()">MAIN LAGI (ACAK SOAL)</button>
    </div>
</div>

<script>
    let bankSoal = [
        {q: "Sistem kekerabatan Minangkabau (garis keturunan Ibu)?", a: "Matrilineal", o: ["Patrilineal", "Matrilineal", "Parental", "Bilateral"]},
        {q: "Sikap merendahkan budaya orang lain disebut?", a: "Etnosentrisme", o: ["Chauvinisme", "Etnosentrisme", "Nasionalisme", "Liberalisme"]},
        {q: "Suku Batak menganut sistem kekerabatan?", a: "Patrilineal", o: ["Matrilineal", "Patrilineal", "Parental", "Bilateral"]},
        {q: "Upaya mencegah konflik sebelum terjadi disebut?", a: "Preventif", o: ["Represif", "Kuratif", "Preventif", "Koersif"]},
        {q: "Penyatuan dua budaya melalui perkawinan?", a: "Amalgamasi", o: ["Asimilasi", "Amalgamasi", "Akulturasi", "Difusi"]},
        {q: "Sikap mencintai tanah air secara wajar disebut?", a: "Nasionalisme", o: ["Chauvinisme", "Nasionalisme", "Patriotisme", "Liberalisme"]},
        {q: "Paham yang mengagungkan bangsa sendiri secara berlebihan?", a: "Chauvinisme", o: ["Nasionalisme", "Chauvinisme", "Patriotisme", "Liberalisme"]},
        {q: "Konflik SARA adalah konflik yang didasari oleh?", a: "Suku, Agama, Ras", o: ["Suku, Agama, Ras", "Sosial, Adil, Rakyat", "Suku, Antar, Ras", "Satu, Agama, Rakyat"]},
        {q: "Sistem kekerabatan Jawa (garis keturunan Ayah & Ibu)?", a: "Parental", o: ["Patrilineal", "Matrilineal", "Parental", "Unilateral"]},
        {q: "Penyelesaian konflik melalui pihak ketiga yang netral?", a: "Mediator", o: ["Jaksa", "Mediator", "Polisi", "Hakim"]},
        {q: "Upaya penyembuhan akibat konflik disebut tindakan?", a: "Kuratif", o: ["Preventif", "Represif", "Kuratif", "Defensif"]},
        {q: "Pasal UUD 1945 tentang sistem ekonomi kerakyatan?", a: "Pasal 33", o: ["Pasal 27", "Pasal 31", "Pasal 33", "Pasal 34"]},
        {q: "Keadilan antara peran laki-laki dan perempuan disebut?", a: "Kesetaraan Gender", o: ["Emansipasi", "Kesetaraan Gender", "Hak Asasi", "Modernisasi"]},
        {q: "Semboyan persatuan bangsa Indonesia adalah?", a: "Bhinneka Tunggal Ika", o: ["Bhinneka Tunggal Ika", "Tut Wuri Handayani", "Merdeka", "Proklamasi"]},
        {q: "Penyelesaian konflik melalui pengadilan disebut?", a: "Ajudikasi", o: ["Mediasi", "Konsiliasi", "Ajudikasi", "Arbitrase"]},
        {q: "Perasaan kelompok yang merasa paling benar sendiri?", a: "Fanatisme", o: ["Fanatisme", "Toleransi", "Simpati", "Empati"]},
        {q: "Munculnya keberagaman di Indonesia disebabkan oleh?", a: "Letak Geografis", o: ["Letak Geografis", "Ekonomi", "Teknologi", "Pendidikan"]},
        {q: "Salah satu penyebab konflik adalah adanya?", a: "Stereotip negatif", o: ["Kerjasama", "Stereotip negatif", "Toleransi", "Integrasi"]},
        {q: "Kebebasan beragama di Indonesia diatur dalam sila ke?", a: "1", o: ["1", "2", "3", "5"]},
        {q: "Kesenjangan ekonomi yang mencolok dapat memicu?", a: "Konflik Sosial", o: ["Persatuan", "Konflik Sosial", "Kemajuan", "Ketertiban"]}
    ];

    let currentQ = 0, score1 = 0, score2 = 0, lives1 = 5, lives2 = 5, turn = 1;

    function shuffleSoal() {
        bankSoal.sort(() => Math.random() - 0.5);
    }

    function startGame() {
        shuffleSoal();
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        if (currentQ >= bankSoal.length || lives1 <= 0 || lives2 <= 0) return endGame();
        
        const turnBox = document.getElementById('turn-box');
        if (turn === 1) {
            turnBox.innerText = "GILIRAN: PLAYER 1 (BIRU)";
            turnBox.className = "turn-indicator p1-color";
        } else {
            turnBox.innerText = "GILIRAN: PLAYER 2 (HIJAU)";
            turnBox.className = "turn-indicator p2-color";
        }

        let s = bankSoal[currentQ];
        document.getElementById('question').innerText = s.q;
        let container = document.getElementById('options-container');
        container.innerHTML = '';
        
        s.o.forEach(opt => {
            let btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = opt;
            btn.onclick = () => {
                if(opt === s.a) {
                    if(turn === 1) score1 += 10; else score2 += 10;
                } else {
                    if(turn === 1) lives1--; else lives2--;
                }
                document.getElementById('s1').innerText = score1;
                document.getElementById('s2').innerText = score2;
                document.getElementById('l1').innerText = lives1;
                document.getElementById('l2').innerText = lives2;
                turn = turn === 1 ? 2 : 1;
                currentQ++;
                showQuestion();
            };
            container.appendChild(btn);
        });
    }

    function endGame() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('end-screen').classList.remove('hidden');
        let msg = lives1 <= 0 || lives2 <= 0 ? "NYAWA HABIS! GAME OVER" : "MISI SELESAI!";
        document.getElementById('winner-text').innerText = msg + "\nP1: " + score1 + " | P2: " + score2;
    }

    function resetAndShuffle() {
        currentQ = 0; score1 = 0; score2 = 0; lives1 = 5; lives2 = 5; turn = 1;
        document.getElementById('s1').innerText = 0; document.getElementById('s2').innerText = 0;
        document.getElementById('l1').innerText = 5; document.getElementById('l2').innerText = 5;
        document.getElementById('end-screen').classList.add('hidden');
        startGame();
    }
</script>
</body>
</html>
