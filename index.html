<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryuu Games - Pocoyo Duel</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #cceeff; color: #333; text-align: center; margin: 0; padding: 10px; overflow-x: hidden; }
        #game-container { max-width: 500px; margin: 20px auto; background: white; padding: 25px; border-radius: 30px; border: 8px solid #ff4444; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); }
        .hero-container { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .p-box { padding: 10px; border-radius: 20px; width: 42%; transition: 0.3s; border: 4px solid #ddd; background: #f9f9f9; }
        .active-p1 { border: 6px solid #00aaff !important; box-shadow: 0 0 20px rgba(0, 170, 255, 0.5); background: #e0f7ff !important; }
        .active-p2 { border: 6px solid #4ecca3 !important; box-shadow: 0 0 20px rgba(78, 204, 163, 0.5); background: #e6fff7 !important; }
        .hero-img { width: 90px; height: 90px; border-radius: 50%; border: 4px solid white; object-fit: cover; background: #fff; }
        .question { font-size: 1.25em; margin: 20px 0; background: #fff8e1; color: #333; padding: 20px; border-radius: 18px; min-height: 65px; line-height: 1.5; border: 3px solid #ffe082; }
        .option { display: block; width: 100%; padding: 16px; margin: 12px 0; background: #4ecca3; border: none; color: white; border-radius: 15px; cursor: pointer; font-size: 1.1em; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 0 #3da17e; }
        .option:hover { background: #ff4444; box-shadow: 0 4px 0 #cc3333; transform: translateY(-2px); }
        .option:active { transform: translateY(2px); box-shadow: 0 0 0 #3da17e; }
        .hidden { display: none; }
        .stats { font-size: 1em; margin-top: 8px; font-weight: bold; }
        h1, p { color: #ff4444; margin: 5px 0; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="setup-screen">
        <h1>🐤 POCOYO DUEL ⚔️</h1>
        <p style="font-size: 1.2em; color: #333;">PPKN Bab 5: Kebhinekaan Indonesia</p>
        <button class="option" style="background: #00aaff; box-shadow: 0 4px 0 #0088cc;" onclick="pilihRole(1)">SAYA PLAYER 1 (POCOYO BIRU)</button>
        <button class="option" style="background: #aaffaa; color: #333; box-shadow: 0 4px 0 #88cc88;" onclick="pilihRole(2)">SAYA PLAYER 2 (POCOYO HIJAU)</button>
        <p style="font-size: 0.8em; color: #888; margin-top: 15px;">*Pastikan temanmu pilih peran yang berbeda di HP sebelah.</p>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="hero-container">
            <div id="box-p1" class="p-box">
                <img src="https://wahyufaez43.github.io/RyuuFT/pocoyo-biru.jpg" class="hero-img">
                <div class="stats" style="color: #00aaff;">P1: ❤️<span id="l1">5</span> ⭐<span id="s1">0</span></div>
            </div>
            <div id="box-p2" class="p-box">
                <img src="https://wahyufaez43.github.io/RyuuFT/pocoyo-hijau.jpg" class="hero-img">
                <div class="stats" style="color: #4ecca3;">P2: ❤️<span id="l2">5</span> ⭐<span id="s2">0</span></div>
            </div>
        </div>
        
        <div id="turn-box" class="question" style="background: #ff4444; color: white; border: none; font-weight: bold;">Menghubungkan...</div>
        <div class="question" id="q-text">Sabar, soal lagi dimuat...</div>
        <div id="options-container"></div>
    </div>
</div>

<script>
    // DATA DARI SCREENSHOT (31) KAMU
    const firebaseConfig = {
        apiKey: "AIzaSyBY3iSYm8317A6Oqsd7RleGgqm_xbacsFM",
        authDomain: "ryuu-6bddd.firebaseapp.com",
        databaseURL: "https://ryuu-6bddd-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ryuu-6bddd",
        storageBucket: "ryuu-6bddd.firebasestorage.app",
        messagingSenderId: "604839716627",
        appId: "1:604839716627:web:NzNmZTk5N2MtMmY3Ni00Mjc0YzFjZThkMmYxMTE2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myRole = 0;
    let bankSoal = [
        {q: "Apa sebutan sistem kekerabatan berdasarkan garis keturunan ibu?", a: "Matrilineal", o: ["Patrilineal", "Matrilineal", "Parental", "Bilateral"]},
        {q: "Suku yang berasal dari daerah Sumatra Utara adalah...", a: "Batak", o: ["Minangkabau", "Batak", "Dayak", "Asmat"]},
        {q: "Sikap menganggap budayanya sendiri paling hebat disebut...", a: "Etnosentrisme", o: ["Etnosentrisme", "Chauvinisme", "Nasionalisme", "Liberalisme"]},
        {q: "Alat musik tradisional Sasando berasal dari...", a: "NTT", o: ["NTT", "Papua", "Maluku", "Jawa Timur"]},
        {q: "Rumah adat suku Toraja dinamakan...", a: "Tongkonan", o: ["Gadang", "Joglo", "Tongkonan", "Honai"]},
        {q: "Apa nama tarian tradisional dari Aceh yang penuh kekompakan?", a: "Saman", o: ["Pendet", "Saman", "Piring", "Kecak"]},
        {q: "Sistem kemasyarakatan Subak terdapat di daerah...", a: "Bali", o: ["Jawa", "Madura", "Bali", "Lombok"]},
        {q: "Bhinneka Tunggal Ika diambil dari kitab Sutasoma karangan...", a: "Mpu Tantular", o: ["Mpu Sedah", "Mpu Prapanca", "Mpu Tantular", "Mpu Panuluh"]},
        {q: "Upacara pembakaran mayat di Bali disebut...", a: "Ngaben", o: ["Kasada", "Ngaben", "Sekaten", "Rambu Solo"]},
        {q: "Suku Dayak berasal dari pulau...", a: "Kalimantan", o: ["Sumatra", "Sulawesi", "Kalimantan", "Papua"]},
        {q: "Sikap merendahkan budaya orang lain?", a: "Etnosentrisme", o: ["Etnosentrisme", "Nasionalisme", "Liberalisme", "Primordialisme"]},
        {q: "Rumah adat Suku Dayak?", a: "Rumah Betang", o: ["Gadang", "Joglo", "Rumah Betang", "Honai"]},
        {q: "Semboyan 'Bhinneka Tunggal Ika' bermakna?", a: "Berbeda-beda tetapi satu", o: ["Berbeda-beda", "Berbeda-beda tetapi satu", "Bersatu", "Bersatu kita teguh"]}
    ];

    function pilihRole(role) {
        myRole = role;
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        if(role === 1) {
            db.ref('game').set({ turn: 1, s1: 0, s2: 0, l1: 5, l2: 5, qIndex: 0 });
        }
    }

    db.ref('game').on('value', (snapshot) => {
        const data = snapshot.val();
        if(!data) return;

        document.getElementById('s1').innerText = data.s1;
        document.getElementById('s2').innerText = data.s2;
        document.getElementById('l1').innerText = data.l1;
        document.getElementById('l2').innerText = data.l2;

        if (data.l1 <= 0 || data.l2 <= 0) {
            let pemenang = data.l1 <= 0 ? "PLAYER 2 (HIJAU) MENANG!" : "PLAYER 1 (BIRU) MENANG!";
            let iconPocoyo = data.l1 <= 0 ? "pocoyo-hijau.jpg" : "pocoyo-biru.jpg";
            document.getElementById('q-text').innerHTML = `
                <img src="https://wahyufaez43.github.io/RyuuFT/${iconPocoyo}" style="width:100px; height:100px; border-radius:50%; border:4px solid #ddd;">
                <h2 style="color:#ff4444">${pemenang}</h2>
            `;
            document.getElementById('options-container').innerHTML = `<button class="option" onclick="location.reload()">MAIN LAGI</button>`;
            return;
        }

        const turnBox = document.getElementById('turn-box');
        const isMyTurn = data.turn === myRole;
        turnBox.innerText = isMyTurn ? "🔥 GILIRAN KAMU! 🔥" : "⏳ TUNGGU LAWAN... ⏳";
        turnBox.style.background = data.turn === 1 ? "#00aaff" : "#4ecca3";
        
        document.getElementById('box-p1').className = data.turn === 1 ? "p-box active-p1" : "p-box";
        document.getElementById('box-p2').className = data.turn === 2 ? "p-box active-p2" : "p-box";

        const soal = bankSoal[data.qIndex];
        document.getElementById('q-text').innerText = soal.q;
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        
        if(isMyTurn) {
            soal.o.forEach(opt => {
                let btn = document.createElement('button');
                btn.className = 'option';
                btn.innerText = opt;
                btn.onclick = () => {
                    let nextIdx = (data.qIndex + 1) % bankSoal.length;
                    let update = { turn: data.turn === 1 ? 2 : 1, qIndex: nextIdx };
                    if(opt === soal.a) {
                        if(myRole === 1) update.s1 = data.s1 + 10; else update.s2 = data.s2 + 10;
                    } else {
                        if(myRole === 1) update.l1 = data.l1 - 1; else update.l2 = data.l2 - 1;
                    }
                    db.ref('game').update(update);
                };
                container.appendChild(btn);
            });
        }
    });
</script>
</body>
</html>
