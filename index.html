<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocoyo Duel - Ryuu Online</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #cceeff; color: #333; text-align: center; margin: 0; padding: 10px; }
        #game-container { max-width: 500px; margin: 20px auto; background: white; padding: 25px; border-radius: 30px; border: 8px solid #ff4444; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); }
        .hero-container { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .p-box { padding: 10px; border-radius: 20px; width: 42%; border: 4px solid #ddd; background: #f9f9f9; }
        .active-p1 { border: 6px solid #00aaff !important; background: #e0f7ff !important; }
        .active-p2 { border: 6px solid #4ecca3 !important; background: #e6fff7 !important; }
        .hero-img { width: 95px; height: 95px; border-radius: 50%; border: 4px solid white; object-fit: cover; background: #eee; }
        .question { font-size: 1.2em; margin: 20px 0; background: #fff8e1; padding: 20px; border-radius: 18px; border: 3px solid #ffe082; min-height: 60px; }
        .option { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #4ecca3; border: none; color: white; border-radius: 15px; cursor: pointer; font-size: 1.1em; font-weight: bold; box-shadow: 0 4px 0 #3da17e; }
        .hidden { display: none; }
        #notif { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 15px 30px; border-radius: 50px; color: white; font-weight: bold; z-index: 100; display: none; animation: pop 0.3s ease; }
        @keyframes pop { from { transform: translateX(-50%) scale(0.5); } to { transform: translateX(-50%) scale(1); } }
    </style>
</head>
<body>

<div id="notif"></div>

<div id="game-container">
    <div id="setup-screen">
        <h1>🐤 POCOYO DUEL ⚔️</h1>
        <p>PPKN Bab 5: Kebhinekaan Indonesia</p>
        <button class="option" style="background: #00aaff; box-shadow: 0 4px 0 #0088cc;" onclick="pilihRole(1)">SAYA PLAYER 1 (POCOYO)</button>
        <button class="option" style="background: #4ecca3; box-shadow: 0 4px 0 #3da17e;" onclick="pilihRole(2)">SAYA PLAYER 2 (TEMAN POCOYO)</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="hero-container">
            <div id="box-p1" class="p-box">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSf8r0V-tX-P_8q5Uq19M3iNqX9B5-1f_6nRA&s" class="hero-img">
                <div>P1: ❤️<span id="l1">5</span> ⭐<span id="s1">0</span></div>
            </div>
            <div id="box-p2" class="p-box">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR3v-m_6r2-vX7-8W8w1v8X_Yy_Yy_Yy_Yy_Yy_Yy&s" class="hero-img">
                <div>P2: ❤️<span id="l2">5</span> ⭐<span id="s2">0</span></div>
            </div>
        </div>
        <div id="turn-box" class="question" style="font-weight: bold; background: #ff4444; color: white;">Menghubungkan...</div>
        <div class="question" id="q-text">Sabar ya...</div>
        <div id="options-container"></div>
    </div>
</div>

<script>
    // Data Firebase kamu
    const firebaseConfig = {
        apiKey: "AIzaSyBY3iSYm8317A6Oqsd7RleGgqm_xbacsFM", 
        databaseURL: "https://ryuu-6bddd-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ryuu-6bddd"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myRole = 0;
    let bankSoal = [
        {q: "Semboyan Bangsa Indonesia adalah...", a: "Bhinneka Tunggal Ika", o: ["Tut Wuri Handayani", "Bhinneka Tunggal Ika", "Pancasila", "UUD 1945"]},
        {q: "Sistem keturunan garis Ibu (Minang) disebut?", a: "Matrilineal", o: ["Patrilineal", "Matrilineal", "Parental", "Bilateral"]},
        {q: "Suku Batak berasal dari provinsi...", a: "Sumatra Utara", o: ["Aceh", "Riau", "Sumatra Utara", "Lampung"]}
    ];

    function showNotif(pesan, warna) {
        const n = document.getElementById('notif');
        n.innerText = pesan;
        n.style.background = warna;
        n.style.display = 'block';
        setTimeout(() => { n.style.display = 'none'; }, 2000);
    }

    function pilihRole(role) {
        myRole = role;
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        if(role === 1) db.ref('game').set({ turn: 1, s1: 0, s2: 0, l1: 5, l2: 5, qIndex: 0 });
    }

    db.ref('game').on('value', (snapshot) => {
        const data = snapshot.val();
        if(!data) return;
        document.getElementById('s1').innerText = data.s1; document.getElementById('s2').innerText = data.s2;
        document.getElementById('l1').innerText = data.l1; document.getElementById('l2').innerText = data.l2;
        
        const isMyTurn = data.turn === myRole;
        const turnBox = document.getElementById('turn-box');
        turnBox.innerText = isMyTurn ? "🔥 GILIRAN KAMU! 🔥" : "⏳ TUNGGU LAWAN... ⏳";
        turnBox.style.background = data.turn === 1 ? "#00aaff" : "#4ecca3";

        document.getElementById('box-p1').className = data.turn === 1 ? "p-box active-p1" : "p-box";
        document.getElementById('box-p2').className = data.turn === 2 ? "p-box active-p2" : "p-box";

        const soal = bankSoal[data.qIndex];
        document.getElementById('q-text').innerText = soal.q;
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        
        if(isMyTurn) {
            soal.o.forEach(opt => {
                let btn = document.createElement('button');
                btn.className = 'option'; btn.innerText = opt;
                btn.onclick = () => {
                    let update = { turn: data.turn === 1 ? 2 : 1, qIndex: (data.qIndex + 1) % bankSoal.length };
                    if(opt === soal.a) { 
                        showNotif("wah kamu benar", "#4ecca3");
                        if(myRole === 1) update.s1 = data.s1 + 10; else update.s2 = data.s2 + 10; 
                    } else { 
                        showNotif("waduhh kamu salah ni", "#ff4444");
                        if(myRole === 1) update.l1 = data.l1 - 1; else update.l2 = data.l2 - 1; 
                    }
                    db.ref('game').update(update);
                };
                container.appendChild(btn);
            });
        }
    });
</script>
</body>
</html>
