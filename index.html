<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civic Quest: Harmoni PPKN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #e0e7ff; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .btn-option { transition: all 0.2s; border: 2px solid #e2e8f0; }
        .btn-option:hover { transform: scale(1.02); border-color: #3b82f6; background: #eff6ff; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="game-container" class="glass max-w-xl w-full rounded-3xl shadow-2xl overflow-hidden border-4 border-white">
        <div class="bg-indigo-600 p-6 text-white flex justify-between items-center">
            <div>
                <p class="text-xs font-bold opacity-75">SKOR</p>
                <h2 id="score" class="text-3xl font-black">0</h2>
            </div>
            <div class="text-right">
                <p class="text-xs font-bold opacity-75">NYAWA</p>
                <h2 id="lives" class="text-3xl">❤️❤️❤️</h2>
            </div>
        </div>

        <div class="w-full h-2 bg-gray-200">
            <div id="timer" class="h-full bg-yellow-400 transition-all duration-100" style="width: 100%"></div>
        </div>

        <div class="p-8">
            <div id="quiz-box">
                <div class="mb-6">
                    <span class="bg-indigo-100 text-indigo-700 px-4 py-1 rounded-full text-sm font-bold">SOAL <span id="q-num">1</span>/10</span>
                </div>
                <h1 id="question" class="text-2xl font-bold text-gray-800 mb-8 leading-tight">Pertanyaan akan muncul di sini...</h1>
                <div id="options" class="grid gap-4">
                    </div>
            </div>

            <div id="result" class="hidden text-center py-8">
                <h2 id="res-title" class="text-4xl font-black text-indigo-600 mb-2">TAMAT!</h2>
                <p id="res-desc" class="text-gray-600 mb-6">Hasil belajar PPKN kamu</p>
                <div class="bg-indigo-50 rounded-2xl p-8 mb-6">
                    <p class="text-gray-500 font-bold uppercase text-xs">Skor Akhir</p>
                    <h3 id="final-score" class="text-6xl font-black text-indigo-600">0</h3>
                </div>
                <button onclick="location.reload()" class="bg-indigo-600 text-white font-bold py-4 px-12 rounded-2xl hover:bg-indigo-700 shadow-lg">MAIN LAGI</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {q: "Upaya menciptakan kehidupan selaras dan seimbang disebut...", o: ["A. Konflik", "B. Harmoni", "C. Integrasi"], a: 1},
            {q: "Keberagaman ekonomi harus disikapi dengan cara...", o: ["A. Kompetisi", "B. Kerja sama", "C. Menghina"], a: 1},
            {q: "Gender dalam masyarakat merujuk pada...", o: ["A. Jenis Kelamin", "B. Peran Sosial", "C. Usia"], a: 1},
            {q: "Masalah akibat keberagaman yang tidak dikelola...", o: ["A. Persatuan", "B. Konflik", "C. Kemakmuran"], a: 1},
            {q: "Contoh harmoni keberagaman gender adalah...", o: ["A. Kesamaan hak sekolah", "B. Dominasi pria", "C. Diskriminasi"], a: 0},
            {q: "Sistem keturunan dari garis ibu disebut...", o: ["A. Patrilineal", "B. Matrilineal", "C. Bilateral"], a: 1},
            {q: "Strategi mengatasi konflik SARA adalah...", o: ["A. Diskriminasi", "B. Preventif", "C. Menghina"], a: 1},
            {q: "Suku Minangkabau menganut sistem...", o: ["A. Patrilineal", "B. Matrilineal", "C. Parental"], a: 1},
            {q: "Menganggap budayanya paling unggul disebut...", o: ["A. Etnosentrisme", "B. Toleransi", "C. Pluralisme"], a: 0},
            {q: "Dasar hukum kebebasan beragama adalah Pasal...", o: ["A. Pasal 27", "B. Pasal 29", "C. Pasal 30"], a: 1}
        ];

        let cur = 0, score = 0, lives = 3, time = 100, timer;

        function start() {
            render();
            timer = setInterval(() => {
                time -= 0.5;
                document.getElementById('timer').style.width = time + "%";
                if(time <= 0) answer(-1);
            }, 100);
        }

        function render() {
            if(cur >= questions.length || lives <= 0) return end();
            time = 100;
            document.getElementById('q-num').innerText = cur + 1;
            document.getElementById('question').innerText = questions[cur].q;
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = '';
            questions[cur].o.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = "btn-option w-full p-5 text-left rounded-2xl bg-white font-semibold text-gray-700 shadow-sm";
                b.innerText = opt;
                b.onclick = () => answer(i);
                optDiv.appendChild(b);
            });
        }

        function answer(i) {
            if(i === questions[cur].a) score += 10;
            else lives--;
            
            document.getElementById('score').innerText = score;
            document.getElementById('lives').innerText = "❤️".repeat(lives) || "💀";
            cur++;
            render();
        }

        function end() {
            clearInterval(timer);
            document.getElementById('quiz-box').classList.add('hidden');
            document.getElementById('timer').parentElement.classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            if(lives <= 0) {
                document.getElementById('res-title').innerText = "GAME OVER";
                document.getElementById('res-title').style.color = "#ef4444";
            }
        }
        start();
    </script>
</body>
</html>
